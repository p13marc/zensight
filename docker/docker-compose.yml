# Docker Compose for ZenSight sensors
# Usage: docker compose -f docker/docker-compose.yml up

services:
  # Logs sensor - ingests network syslog + systemd-journald, publishes to Zenoh
  sensor-logs:
    image: ghcr.io/p13marc/zensight-sensor-logs:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.sensor
      args:
        SENSOR_PACKAGE: zensight-sensor-logs
        SENSOR_NAME: syslog
    ports:
      - "514:514/udp"   # Syslog UDP
      - "514:514/tcp"   # Syslog TCP
      - "7447:7447"     # Zenoh
    volumes:
      - ./configs/syslog.json5:/etc/zensight/config.json5:ro
    command: ["--config", "/etc/zensight/config.json5"]
    restart: unless-stopped

  # Sysinfo sensor - collects system metrics and publishes to Zenoh
  sensor-sysinfo:
    image: ghcr.io/p13marc/zensight-sensor-sysinfo:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.sensor
      args:
        SENSOR_PACKAGE: zensight-sensor-sysinfo
        SENSOR_NAME: sysinfo
    ports:
      - "7448:7447"     # Zenoh (different port to avoid conflict)
    volumes:
      - ./configs/sysinfo.json5:/etc/zensight/config.json5:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command: ["--config", "/etc/zensight/config.json5"]
    restart: unless-stopped

  # SNMP sensor - polls SNMP agents and publishes to Zenoh
  sensor-snmp:
    image: ghcr.io/p13marc/zensight-sensor-snmp:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.sensor
      args:
        SENSOR_PACKAGE: zensight-sensor-snmp
        SENSOR_NAME: snmp
    ports:
      - "162:162/udp"   # SNMP traps
      - "7449:7447"     # Zenoh (different port to avoid conflict)
    volumes:
      - ./configs/snmp.json5:/etc/zensight/config.json5:ro
    command: ["--config", "/etc/zensight/config.json5"]
    restart: unless-stopped
