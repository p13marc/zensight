name: Release Packages

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  # Build-only validation when packaging-related files change. No registry push
  # (Docker login/push is guarded with `if: github.event_name != 'pull_request'`)
  # and no GitHub Release (the `release` job is gated on `refs/tags`).
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "docker/**"
      - "packaging/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 0.1.0)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/zensight

jobs:
  # =============================================================================
  # Build Debian packages for zensight frontend
  # =============================================================================
  build-deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: ubuntu22.04
          - os: ubuntu-24.04
            name: ubuntu24.04
          - os: ubuntu-22.04-arm
            name: ubuntu22.04-arm64
          - os: ubuntu-24.04-arm
            name: ubuntu24.04-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libxkbcommon-dev libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release -p zensight

      - name: Build .deb package for zensight
        run: cargo deb -p zensight --no-build

      - name: Rename package with distro suffix
        run: |
          cd target/debian
          for f in *.deb; do
            mv "$f" "${f%.deb}-${{ matrix.name }}.deb"
          done

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deb-zensight-${{ matrix.name }}
          path: target/debian/*.deb
          if-no-files-found: error

  # =============================================================================
  # Build Debian packages for sensors
  # =============================================================================
  build-deb-sensors:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: ubuntu22.04
          - os: ubuntu-24.04
            name: ubuntu24.04
          - os: ubuntu-22.04-arm
            name: ubuntu22.04-arm64
          - os: ubuntu-24.04-arm
            name: ubuntu24.04-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # protobuf-compiler: gnmi · libsystemd-dev: logs (journald)
          # libpcap-dev: netring (AF_PACKET/pcap) · libssl-dev: snmp
          sudo apt-get install -y protobuf-compiler libsystemd-dev libpcap-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binaries
        run: |
          cargo build --release \
            -p zensight-sensor-logs \
            -p zensight-sensor-sysinfo \
            -p zensight-sensor-snmp \
            -p zensight-sensor-gnmi \
            -p zensight-sensor-modbus \
            -p zensight-sensor-netflow \
            -p zensight-sensor-netlink \
            -p zensight-sensor-netring \
            -p zensight-sensor-systemd

      - name: Build .deb packages for sensors
        run: |
          for s in logs sysinfo snmp gnmi modbus netflow netlink netring systemd; do
            cargo deb -p "zensight-sensor-$s" --no-build
          done

      - name: Rename packages with distro suffix
        run: |
          cd target/debian
          for f in *.deb; do
            mv "$f" "${f%.deb}-${{ matrix.name }}.deb"
          done

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deb-sensors-${{ matrix.name }}
          path: target/debian/*.deb
          if-no-files-found: error

  # =============================================================================
  # Build Debian packages for exporters
  # =============================================================================
  build-deb-exporters:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: ubuntu22.04
          - os: ubuntu-24.04
            name: ubuntu24.04
          - os: ubuntu-22.04-arm
            name: ubuntu22.04-arm64
          - os: ubuntu-24.04-arm
            name: ubuntu24.04-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libsystemd-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binaries
        run: |
          cargo build --release -p zensight-exporter-prometheus
          cargo build --release -p zensight-exporter-otel

      - name: Build .deb packages for exporters
        run: |
          cargo deb -p zensight-exporter-prometheus --no-build
          cargo deb -p zensight-exporter-otel --no-build

      - name: Rename packages with distro suffix
        run: |
          cd target/debian
          for f in *.deb; do
            mv "$f" "${f%.deb}-${{ matrix.name }}.deb"
          done

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deb-exporters-${{ matrix.name }}
          path: target/debian/*.deb
          if-no-files-found: error

  # =============================================================================
  # Build RPM packages using Fedora container
  # =============================================================================
  build-rpm-fedora:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    container: fedora:41
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # protobuf-devel provides the well-known-type includes
          # (google/protobuf/*.proto) that gnmi's build needs — Fedora's
          # protobuf-compiler ships protoc but not those includes.
          dnf install -y gcc pkg-config protobuf-compiler protobuf-devel \
            libxkbcommon-devel wayland-devel openssl-devel perl-FindBin \
            systemd-devel libpcap-devel

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-generate-rpm
        run: |
          source $HOME/.cargo/env
          cargo install cargo-generate-rpm

      - name: Build release binaries
        run: |
          source $HOME/.cargo/env
          cargo build --release -p zensight
          cargo build --release \
            -p zensight-sensor-logs \
            -p zensight-sensor-sysinfo \
            -p zensight-sensor-snmp \
            -p zensight-sensor-gnmi \
            -p zensight-sensor-modbus \
            -p zensight-sensor-netflow \
            -p zensight-sensor-netlink \
            -p zensight-sensor-netring \
            -p zensight-sensor-systemd
          cargo build --release -p zensight-exporter-prometheus
          cargo build --release -p zensight-exporter-otel

      - name: Build .rpm packages
        run: |
          source $HOME/.cargo/env
          cargo generate-rpm -p zensight
          for s in logs sysinfo snmp gnmi modbus netflow netlink netring systemd; do
            cargo generate-rpm -p "zensight-sensor-$s"
          done
          cargo generate-rpm -p zensight-exporter-prometheus
          cargo generate-rpm -p zensight-exporter-otel

      - name: Rename packages with distro suffix
        run: |
          cd target/generate-rpm
          for f in *.rpm; do
            mv "$f" "${f%.rpm}-fc41.rpm"
          done

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          # cargo-generate-rpm already embeds the arch (x86_64 / aarch64) in the
          # filename, so the merged release dir won't collide; the artifact name
          # is still split per-arch to keep the two matrix legs distinct.
          name: rpm-fedora41-${{ matrix.arch }}
          path: target/generate-rpm/*.rpm
          if-no-files-found: error

  # =============================================================================
  # Build Flatpak for zensight frontend
  # =============================================================================
  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/com.github.p13marc.ZenSight.yml
          bundle: zensight.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-zensight
          path: zensight.flatpak
          if-no-files-found: error

  # =============================================================================
  # Build Docker images for sensors
  # =============================================================================
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        sensor:
          - name: syslog
            package: zensight-sensor-logs
          - name: sysinfo
            package: zensight-sensor-sysinfo
          - name: snmp
            package: zensight-sensor-snmp
          - name: gnmi
            package: zensight-sensor-gnmi
          - name: modbus
            package: zensight-sensor-modbus
          - name: netflow
            package: zensight-sensor-netflow
          - name: netlink
            package: zensight-sensor-netlink
          - name: netring
            package: zensight-sensor-netring
          # Needs the host D-Bus system bus mounted at runtime:
          # -v /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
          - name: systemd
            package: zensight-sensor-systemd
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-sensor-${{ matrix.sensor.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sensor
          build-args: |
            SENSOR_PACKAGE=${{ matrix.sensor.package }}
            SENSOR_NAME=${{ matrix.sensor.name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # =============================================================================
  # Build Docker images for exporters
  # =============================================================================
  build-docker-exporters:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        exporter:
          - name: prometheus
            package: zensight-exporter-prometheus
          - name: otel
            package: zensight-exporter-otel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-exporter-${{ matrix.exporter.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.exporter
          build-args: |
            EXPORTER_PACKAGE=${{ matrix.exporter.package }}
            EXPORTER_NAME=${{ matrix.exporter.name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # =============================================================================
  # Create GitHub Release with all artifacts
  # =============================================================================
  release:
    needs:
      [
        build-deb,
        build-deb-sensors,
        build-deb-exporters,
        build-rpm-fedora,
        build-flatpak,
      ]
    runs-on: ubuntu-latest
    # Run after build-docker completes but don't block on it for artifacts
    # build-docker only pushes to registry, doesn't produce downloadable artifacts
    if: startsWith(github.ref, 'refs/tags') && !cancelled()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download deb-zensight artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: deb-zensight-*

      - name: Download deb-sensors artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: deb-sensors-*

      - name: Download deb-exporters artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: deb-exporters-*

      - name: Download rpm artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rpm-*

      - name: Download flatpak artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: flatpak-*

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.flatpak
