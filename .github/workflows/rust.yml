name: Rust

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# Cancel an in-progress run when a newer commit is pushed to the same ref, so we
# don't burn a runner finishing a build that's already superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Shrink the target dir so the large workspace (zenoh + iced + all sensors and
  # exporters) doesn't exhaust the runner disk. Debuginfo dominates target size;
  # CI doesn't need it. Also disables incremental artifacts. (#52 follow-up: the
  # post-merge run hit "No space left on device".)
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Reclaim ~25 GB of preinstalled toolchains we don't use, so the
      # whole-workspace debug build + test binaries fit on disk.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android
          sudo docker image prune --all --force || true
          df -h /

      - name: Install build deps
        run: |
          sudo apt-get update
          # protobuf-compiler: gnmi sensor; libsystemd-dev: journald source in the
          # syslog sensor (default-on `journald` feature links libsystemd).
          sudo apt-get install -y protobuf-compiler libsystemd-dev
          protoc --version

      # Cache the cargo registry/git + build artifacts keyed on Cargo.lock and
      # the toolchain. The zenoh + iced dependency graph dominates compile time
      # and changes rarely, so most runs restore it instead of rebuilding it.
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # `cargo test` compiles the whole workspace (libs, bins, and test
      # targets), so it subsumes a separate `cargo build` — one compile pass.
      - name: Build & test
        run: cargo test --workspace --locked

  # Format + lint gate. Kept in its own job so a lint failure is reported
  # independently of (and in parallel with) the build/test job.
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android
          sudo docker image prune --all --force || true

      - name: Install build deps
        run: |
          sudo apt-get update
          # Same native deps as the test job so clippy can compile every crate:
          # protobuf-compiler (gnmi), libsystemd-dev (logs/journald),
          # libssl-dev (snmp via openssl).
          sudo apt-get install -y protobuf-compiler libsystemd-dev libssl-dev

      - name: Install clippy + rustfmt
        run: rustup component add clippy rustfmt

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # D2 (#28): all colors must come from the design-system modules
      # (view/theme.rs, view/tokens.rs, view/components/). No ad-hoc
      # Color::from_rgb[a] anywhere else — use a theme accessor / constant or
      # kit::rgb() for data colors.
      - name: no ad-hoc colors (D2 guard)
        run: |
          hits=$(grep -rn "Color::from_rgb" zensight/src --include='*.rs' \
            | grep -vE "view/theme\.rs|view/tokens\.rs|view/components/" || true)
          if [ -n "$hits" ]; then
            echo "::error::Ad-hoc Color::from_rgb outside the design-system modules:"
            echo "$hits"
            exit 1
          fi

      # zenoh-blob is a generic crate meant to graduate to its own repo +
      # crates.io (#202). It must stay free of ZenSight types and path deps so
      # the switch to the published crate is a one-line change. Guard the
      # [dependencies] / [dev-dependencies] section of its Cargo.toml.
      - name: zenoh-blob boundary guard
        run: |
          deps=$(awk '/^\[(dev-)?dependencies\]/{f=1;next} /^\[/{f=0} f' zenoh-blob/Cargo.toml)
          hits=$(echo "$deps" | grep -nE 'zensight|path *=' || true)
          if [ -n "$hits" ]; then
            echo "::error::zenoh-blob must not depend on ZenSight crates or path deps (it graduates to crates.io):"
            echo "$hits"
            exit 1
          fi
